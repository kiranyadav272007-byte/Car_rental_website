<!DOCTYPE html>
<html>
<head>
    <title>View Rentals</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Rental Details</h1>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Phone Number</th>
            <th>Address</th>
            <th>Car Name</th>
            <th>Rent Date</th>
            <th>Delete</th>
        </tr>

        {% for rental in rentals %}
        <tr>
            <td>{{ rental[0] }}</td>
            <td>{{ rental[1] }}</td>
            <td>{{ rental[2] }}</td>
            <td>{{ rental[3] }}</td>
            <td>{{ rental[4] }}</td>
            <td>{{ rental[5] }}</td>
            <td>
                <a href="/delete/{{ rental[0] }}">
                    <button>Delete</button>
                </a>
            </td>
        </tr>
        {% endfor %}

    </table>

    <br>
    <a href="/">Home Page</a>
</div>

</body>
</html>
